spring.application.name=authservice
spring.datasource.url=jdbc:mysql://mysql:3306/auth_db
spring.datasource.username=app_user
spring.datasource.password=app_pass
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

kafka.topic.name=auth.user-registered
kafka.topic-json.name=auth_user_registered
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.producer.value-serializer=com.suyash.authservice.serializer.UserDetailsSerializer